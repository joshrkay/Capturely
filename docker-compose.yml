version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: capturely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capturely_dev
    ports:
      - "5432:5432"
    volumes:
      - capturely_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d capturely_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  capturely_pg_data:
